<!DOCTYPE html>
<html lang="fr">

            padding: 20px;
        }

            background: white;
            border-radius: 20px;

        }

        textarea:focus {

            border-color: #667eea;
        }

        .questions {
            display: none;
            margin-top: 30px;
        }

        .question-block {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .question-block h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-button {
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            font-size: 1em;
        }

        .option-button:hover {
            background: #f0f0f0;
            border-color: #667eea;
        }

        .option-button.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
            display: inline-block;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .results {
            display: none;
            margin-top: 40px;
        }

        .results-title {
            font-size: 2em;
            color: #667eea;
            margin-bottom: 30px;
            text-align: center;
        }

        .courant-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .courant-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .courant-name {
            font-size: 1.5em;
            color: #333;
            font-weight: bold;
        }

        .courant-score {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.2em;
        }

        .courant-description {
            color: #666;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .indicators {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .indicators h4 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .indicators ul {
            padding-left: 20px;
        }

        .indicators li {
            margin-bottom: 8px;
            color: #555;
        }

        .theoriciens {
            background: #fff8e6;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .theoriciens h4 {
            color: #d97706;
            margin-bottom: 10px;
        }

        .references {
            background: #e6f3ff;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.9em;
        }

        .references h4 {
            color: #2563eb;
            margin-bottom: 10px;
        }

        .references p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 5px;
        }

            background: #6c757d;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn-reset:hover {
            background: #5a6268;
        }

            .content {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .courant-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 Analyseur de Courants Pédagogiques</h1>
            <p>Outil d'analyse pour les situations d'accompagnement à La Pallanterie - Formation MSP ARPIH</p>
        </div>

        <div class="content">
            <div id="step1" class="section">
                <h2 class="section-title">Décrivez votre situation</h2>
                <textarea id="situationDescription" placeholder="Décrivez une situation d'accompagnement vécue à La Pallanterie (atelier conditioning-logistique). Par exemple : interactions avec un bénéficiaire CEA, méthode utilisée, objectifs visés, résultats observés..."></textarea>
                <button class="btn-primary" onclick="analyzerInitial()">Analyser la situation</button>
            </div>

            <div id="questions" class="questions section">
                <h2 class="section-title">Questions de précision</h2>
                <p style="color: #666; margin-bottom: 20px;">Pour affiner l'analyse, répondez à ces questions sur votre situation :</p>
                
                <div id="questionsContainer"></div>
                
                <button class="btn-primary" onclick="generateResults()">Voir les résultats d'analyse</button>
            </div>

            <div id="results" class="results">
                <h2 class="results-title">📊 Analyse des Courants Pédagogiques Identifiés</h2>
                <div id="resultsContainer"></div>
                <button class="btn-reset" onclick="reset()">Nouvelle analyse</button>
            </div>
        </div>
    </div>

    <script>

                indicators: [

                    "Carl Rogers (1902-1987) - Approche Centrée sur la Personne (ACP)",

                    "Vous écoutez le vécu et les ressentis du bénéficiaire",

                    "L'erreur est source d'apprentissage et de croissance personnelle"
                ],
                references: [
                    "Lipiansky, E.-M. (2019). Carl Rogers et la psychologie humaniste. Psychologies pour la formation, Dunod, p.87-104. https://shs.cairn.info/",

                name: "Socioconstructivisme",
                description: "L'apprentissage se construit par l'interaction sociale et la coopération. Le bénéficiaire construit activement ses connaissances avec l'aide d'autrui (médiation sociale). Zone proximale de développement : écart entre ce que la personne peut faire seule et avec aide. Le conflit socio-cognitif est source de progrès.",

                    "Jean Piaget (1896-1980) - Constructivisme, épistémologie génétique",
                    "Henri Wallon (1879-1962)",
                    "Jerome Bruner - Étayage (scaffolding)",
                    "Concepts clés : Zone Proximale de Développement (ZPD), médiation, interpsychique → intrapsychique"
                ],
                indicators: [
                    "Vous favorisez les échanges entre bénéficiaires",
                    "Vous créez des situations de travail collaboratif",

                    "Le conflit cognitif entre pairs est source d'apprentissage",
                    "L'apprentissage se fait d'abord socialement puis individuellement"
                ],
                references: [
                    "Garnier, C., Bednarz, N. et Ulanovskaya, I. (2009). Après Vygotski et Piaget : Perspectives sociale et constructiviste. De Boeck Supérieur. https://shs.cairn.info/",
                    "Bourgeois, É. (2019). Jean Piaget et le paradigme constructiviste de l'apprentissage. Psychologies pour la formation, Dunod, p.71-86. https://shs.cairn.info/",
                    "Grangeat, M. (2016). Lev S. Vygotski : l'apprentissage par le groupe. Éduquer et Former, p.134-141. https://shs.cairn.info/",

        const questions = [
            {

                question: "Quelle posture avez-vous adoptée principalement ?",

                    { text: "Observateur et analyste des interactions", courants: ["systemique"], weight: 3 },
                    { text: "Guide qui structure l'apprentissage progressif", courants: ["behaviorisme", "competences"], weight: 2 },
                    { text: "Médiateur entre pairs qui apprennent ensemble", courants: ["socioconstructivisme"], weight: 3 }
                ]
            },
            {
                id: "objectif",
                question: "Quel était l'objectif principal de la situation ?",
                options: [
                    { text: "Transmettre un savoir-faire technique précis", courants: ["transmissif"], weight: 3 },

                ]
            },

                question: "Quelle méthode avez-vous principalement utilisée ?",
                options: [
                    { text: "Démonstration puis imitation et reproduction", courants: ["transmissif", "behaviorisme"], weight: 2 },
                    { text: "Écoute active, questionnement non-directif", courants: ["humaniste"], weight: 3 },

        let situationText = "";
        let answers = {};

        function analyzerInitial() {
            situationText = document.getElementById('situationDescription').value.trim();
            
            if (!situationText) {
                alert("Merci de décrire votre situation avant de continuer.");
                return;
            }

            if (situationText.length < 50) {
                alert("Votre description semble un peu courte. Pour une analyse plus précise, essayez de donner plus de détails sur la situation.");
                return;
            }

            document.getElementById('step1').style.display = 'none';
            document.getElementById('questions').style.display = 'block';
            
            renderQuestions();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function analyzeKeywords(text) {
            const keywords = {
                transmissif: ['montrer', 'expliquer', 'démonstration', 'enseigner', 'transmettre', 'apprendre à', 'corriger'],
                behaviorisme: ['répéter', 'répétition', 'encourager', 'féliciter', 'récompense', 'comportement', 'automatisme', 'renforcer', 'conditionner'],
                cognitivisme_tcc: ['penser', 'pensée', 'croyance', 'émotion', 'stratégie', 'résolution', 'cognitive'],
                humaniste: ['écouter', 'écoute', 'confiance', 'autonomie', 'ressenti', 'empathie', 'accompagner', 'respecter', 'accepter', 'bienveillance'],
                systemique: ['interaction', 'communica', 'relation', 'équipe', 'dynamique', 'contexte', 'environnement', 'système', 'circulaire', 'pattern'],
                socioconstructivisme: ['groupe', 'collaboration', 'échange', 'collectif', 'pairs', 'ensemble', 'coopération', 'débat', 'confrontation'],
                competences: ['compétence', 'situation réelle', 'action', 'professionnel', 'pratique', 'transfert', 'mobiliser']
            };
            
            const scores = {};
            
            for (const [courant, words] of Object.entries(keywords)) {
                scores[courant] = words.filter(word => text.includes(word)).length;
            }
            
            return scores;
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            
            questions.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-block';
                questionDiv.innerHTML = `
                    <h3>${index + 1}. ${q.question}</h3>
                    <div class="options" id="options-${q.id}"></div>
                `;
                container.appendChild(questionDiv);
                
                const optionsDiv = document.getElementById(`options-${q.id}`);
                q.options.forEach((option, optIndex) => {
                    const button = document.createElement('button');
                    button.className = 'option-button';
                    button.textContent = option.text;
                    button.onclick = () => selectOption(q.id, optIndex, button);
                    optionsDiv.appendChild(button);
                });
            });
        }

        function selectOption(questionId, optionIndex, button) {
            const optionsDiv = button.parentElement;
            Array.from(optionsDiv.children).forEach(btn => {
                btn.classList.remove('selected');
            });
            
            button.classList.add('selected');
            
            const question = questions.find(q => q.id === questionId);
            answers[questionId] = question.options[optionIndex];
        }

        function generateResults() {
            if (Object.keys(answers).length < questions.length) {
                alert("Merci de répondre à toutes les questions avant de continuer.");
                return;
            }

            const scores = {};
            
            for (const courantKey in courants) {
                scores[courantKey] = 0;
            }

            const keywordScores = analyzeKeywords(situationText.toLowerCase());
            for (const [courant, score] of Object.entries(keywordScores)) {
                scores[courant] += score;
            }

            for (const answer of Object.values(answers)) {
                for (const courant of answer.courants) {
                    scores[courant] += answer.weight;
                }
            }

            const sortedCourants = Object.entries(scores)
                .filter(([_, score]) => score > 0)
                .sort((a, b) => b[1] - a[1])
                .map(([courantKey, score]) => ({
                    key: courantKey,
                    score: score,
                    data: courants[courantKey]
                }));

            displayResults(sortedCourants);
        }

        function displayResults(sortedCourants) {
            document.getElementById('questions').style.display = 'none';
            document.getElementById('results').style.display = 'block';

            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';

            if (sortedCourants.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#666;">Aucun courant identifié. Essayez de fournir plus de détails dans votre description.</p>';
                return;
            }

            const maxScore = sortedCourants[0].score;
            
            sortedCourants.forEach((courant, index) => {
                const card = document.createElement('div');
                card.className = 'courant-card';
                
                let intensite = '';
                const scorePercent = (courant.score / maxScore * 100);
                
                if (scorePercent >= 80) {
                    intensite = '🔥 Dominant';
                } else if (scorePercent >= 50) {
                    intensite = '⭐ Présent';
                } else {
                    intensite = '💫 Identifié';
                }

                const indicatorsHTML = `
                    <div class="indicators">
                        <h4>📌 Indicateurs dans votre pratique :</h4>
                        <ul>
                            ${courant.data.indicators.map(ind => `<li>${ind}</li>`).join('')}
                        </ul>
                    </div>
                `;

                const theoriciensHTML = courant.data.theoriciens.length > 0 ? `
                    <div class="theoriciens">
                        <h4>👤 Théoriciens / Références :</h4>
                        <p>${courant.data.theoriciens.join(' • ')}</p>
                    </div>
                ` : '';

                const referencesHTML = courant.data.references.length > 0 ? `
                    <div class="references">
                        <h4>📚 Références académiques vérifiées (Cairn.info, sources HES-SO) :</h4>
                        ${courant.data.references.map(ref => `<p>• ${ref}</p>`).join('')}
                    </div>
                ` : '';

                card.innerHTML = `
                    <div class="courant-header">
                        <div class="courant-name">${courant.data.name}</div>
                        <div class="courant-score">${intensite}</div>
                    </div>
                    <div class="courant-description">
                        ${courant.data.description}
                    </div>
                    ${indicatorsHTML}
                    ${theoriciensHTML}
                    ${referencesHTML}
                    <div style="margin-top: 20px; padding-top: 15px; border-top: 2px solid #e0e0e0; color: #667eea; font-weight: bold;">
                        💡 Pourquoi ce courant a été identifié : Vos réponses et votre description correspondent à ${courant.score} indicateurs de ce courant pédagogique.
                    </div>
                `;
                
                container.appendChild(card);
            });

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function reset() {
            document.getElementById('situationDescription').value = '';
            situationText = "";
            answers = {};
            
            document.getElementById('step1').style.display = 'block';
            document.getElementById('questions').style.display = 'none';
            document.getElementById('results').style.display = 'none';
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
